<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Admin - Imobiliária Novo Horizonte</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="admin.js" defer></script>
</head>

<body class="bg-gray-100 text-gray-800">

    <!-- tela de login em página separada. 
    bloquear o painel administrativo até o usuário digitar usuário e senha corretos. -->

    <section id="login-screen" class="min-h-screen flex items-center justify-center px-4">
        <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-sm">
            <h1 class="text-2xl font-bold text-center mb-2">Área Administrativa</h1>
            <p class="text-center text-gray-500 mb-6">Entre para gerenciar os imóveis</p>

            <label class="text-sm font-bold">Usuário</label>
            <input id="loginUser" type="text" placeholder="Usuário" class="w-full p-3 border rounded-lg mb-4 mt-1">

            <label class="text-sm font-bold">Senha</label>
            <input id="loginPass" type="password" placeholder="Senha" class="w-full p-3 border rounded-lg mb-4 mt-1">

            <button onclick="login()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg">Entrar</button>
            <p id="loginError" class="text-red-500 text-sm text-center mt-3"></p>

            <a href="index.html" class="block text-center text-blue-600 mt-5 text-sm">Voltar ao site</a>
        </div>
    </section>

    <!--  painel administrativo separado da página principal. -->
    <!-- funções CRUD. -->
    <main id="admin-panel" class="hidden">
        <header class="bg-white shadow-sm sticky top-0 z-50">
            <div class="max-w-7xl mx-auto px-4 h-20 flex items-center justify-between">
                <div>
                    <h1 class="text-xl font-bold">Painel Administrativo</h1>
                    <p class="text-xs text-gray-500">Cadastrar, editar e excluir imóveis</p>
                </div>
                <div class="flex gap-3">
                    <a href="index.html" class="bg-gray-200 px-4 py-2 rounded-full font-bold text-sm">Ver site</a>
                    <button onclick="logout()" class="bg-red-600 text-white px-4 py-2 rounded-full font-bold text-sm">Sair</button>
                </div>
            </div>
        </header>

        <section class="max-w-7xl mx-auto px-4 py-10 grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="bg-white rounded-2xl shadow-md p-6 lg:col-span-1">
                <h2 id="formTitle" class="text-2xl font-bold mb-5">Cadastrar novo imóvel</h2>

                <!-- campo oculto usado para saber se o formulário está cadastrando um novo imóvel ou editando um existente. -->
                <input type="hidden" id="editingId">

                <label class="text-sm font-bold">Código</label>
                <input id="id" placeholder="Ex: AP-9999" class="w-full p-3 border rounded-lg mb-3 mt-1">

                <label class="text-sm font-bold">Título</label>
                <input id="title" placeholder="Ex: Apartamento com varanda" class="w-full p-3 border rounded-lg mb-3 mt-1">

                <label class="text-sm font-bold">Preço</label>
                <input id="price" placeholder="Ex: R$ 300.000" class="w-full p-3 border rounded-lg mb-3 mt-1">

                <label class="text-sm font-bold">Características</label>
                <input id="specs" placeholder="Ex: 2 dorms • 1 vaga • 60m²" class="w-full p-3 border rounded-lg mb-3 mt-1">

                <label class="text-sm font-bold">Localização</label>
                <input id="location" placeholder="Ex: Centro" class="w-full p-3 border rounded-lg mb-3 mt-1">

                <label class="text-sm font-bold">Tipo</label>
                <select id="type" class="w-full p-3 border rounded-lg mb-3 mt-1 bg-white">
                    <option value="Apartamento">Apartamento</option>
                    <option value="Casa">Casa</option>
                    <option value="Imoveis comerciais">Imóveis Comerciais</option>
                    <option value="Rural">Rural</option>
                </select>

                <label class="text-sm font-bold">Imagem</label>
                <!--  pode enviar uma foto do computador. -->
                <input id="imageFile" type="file" accept="image/*" class="w-full p-3 border rounded-lg mb-2 mt-1 bg-white">
                <!--permite colar uma URL de imagem -->
                <input id="image" placeholder="Ou cole uma URL/caminho da imagem" class="w-full p-3 border rounded-lg mb-5 mt-1">

                <button onclick="savePropertyFromForm()" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3 rounded-lg mb-3">Salvar imóvel</button>
                <button onclick="clearForm()" class="w-full bg-gray-200 hover:bg-gray-300 font-bold py-3 rounded-lg">Limpar formulário</button>
            </div>

            <div class="lg:col-span-2">
                <div class="flex items-center justify-between mb-4">
                    <h2 class="text-2xl font-bold">Imóveis cadastrados</h2>
                    <p class="text-sm text-gray-500"><span id="admin-count">0</span> imóveis</p>
                </div>
                
                <div id="admin-list" class="grid grid-cols-1 md:grid-cols-2 gap-5"></div>
            </div>
        </section>
    </main>

</body>
</html>
